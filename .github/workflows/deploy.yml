name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-workers
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject D1 database ID
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_D1_DATABASE_ID" ]; then
            echo "Missing secret: CLOUDFLARE_D1_DATABASE_ID"
            exit 1
          fi
          # Patch only the in-runner config; never commit real IDs
          node -e "
            const fs = require('fs');
            const id = process.env.CLOUDFLARE_D1_DATABASE_ID;
            let t = fs.readFileSync('wrangler.toml', 'utf8');
            t = t.replace(
              /database_id\\s*=\\s*\"[^\"]*\"/,
              'database_id = \"' + id + '\"'
            );
            fs.writeFileSync('wrangler.toml', t);
            console.log('Injected D1 database_id');
          "

      - name: Build
        run: pnpm build
        env:
          RUNTIME: cloudflare

      - name: Apply D1 migrations
        run: pnpm db:migrate:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: pnpm exec wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
