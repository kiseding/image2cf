name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-workers
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject D1 database ID + R2 bucket name
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        run: |
          if [ -z "$CLOUDFLARE_D1_DATABASE_ID" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_D1_DATABASE_ID"
            exit 1
          fi
          node -e "
            const fs = require('fs');
            const id = process.env.CLOUDFLARE_D1_DATABASE_ID;
            const bucket = process.env.CLOUDFLARE_R2_BUCKET_NAME || 'image2cf';
            let t = fs.readFileSync('wrangler.toml', 'utf8');
            t = t.replace(
              /database_id\\s*=\\s*\"[^\"]*\"/,
              'database_id = \"' + id + '\"'
            );
            t = t.replace(
              /bucket_name\\s*=\\s*\"[^\"]*\"/,
              'bucket_name = \"' + bucket + '\"'
            );
            fs.writeFileSync('wrangler.toml', t);
            console.log('Injected D1 database_id and R2 bucket_name=' + bucket);
          "

      - name: Ensure R2 bucket exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
        run: |
          BUCKET="${CLOUDFLARE_R2_BUCKET_NAME:-image2cf}"
          # create is idempotent enough: ignore "already exists"
          pnpm exec wrangler r2 bucket create "$BUCKET" 2>&1 | tee /tmp/r2-create.log || true
          if grep -qiE 'already exists|Created bucket|Success' /tmp/r2-create.log; then
            echo "R2 bucket ready: $BUCKET"
          else
            echo "R2 create output (continuing if bucket already present):"
            cat /tmp/r2-create.log
          fi

      - name: Ensure generation queues exist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler queues create image2cf-generation || true
          pnpm exec wrangler queues create image2cf-generation-dlq || true

      - name: Build
        run: pnpm build
        env:
          RUNTIME: cloudflare

      - name: Apply D1 migrations
        run: pnpm db:migrate:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: pnpm exec wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # GitHub Secret → Cloudflare Worker Secret (same as other projects)
      - name: Sync ADMIN_PASSWORD to Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$ADMIN_PASSWORD" ]; then
            echo "Missing GitHub secret: ADMIN_PASSWORD"
            echo "Add it under Repo → Settings → Secrets and variables → Actions"
            exit 1
          fi
          # stdin form avoids echoing secret in process list logs
          printf '%s' "$ADMIN_PASSWORD" | pnpm exec wrangler secret put ADMIN_PASSWORD
          echo "ADMIN_PASSWORD synced to Worker"

      - name: Sync credential encryption secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CREDENTIALS_SECRET: ${{ secrets.CREDENTIALS_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          SECRET="${CREDENTIALS_SECRET:-$ADMIN_PASSWORD}"
          printf '%s' "$SECRET" | pnpm exec wrangler secret put CREDENTIALS_SECRET
